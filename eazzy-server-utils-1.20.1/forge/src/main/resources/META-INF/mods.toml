modLoader = "javafml" #mandatory
loaderVersion = "*" #mandatory. Allow all forge versions as we are defining what Minecraft versions we require later on
license = "${license}" # Review your options at https://choosealicense.com/.

[[mods]] #mandatory
modId = "${mod_id}" #mandatory
version = "${version}" #mandatory
displayName = "${mod_name}" #mandatory
logoFile = "assets/${mod_id}/icon.png" #optional
credits = "${credits}" #optional
authors = $mod_authors #optional
description = '''
Eazzy Server Utils is a Forge mod for Minecraft 1.20.1 that adds essential utilities for multiplayer servers, serving both regular players and staff with categorized commands.
'''

[[dependencies.${mod_id}]] #optional
modId = "forge" #mandatory
mandatory = true #mandatory
versionRange = "[0,)" #mandatory
ordering = "NONE" # The order that this dependency should load in relation to your mod, required to be either 'BEFORE' or 'AFTER' if the dependency is not mandatory
side = "BOTH" # Side this dependency is applied on - 'BOTH', 'CLIENT' or 'SERVER'

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${compatible_forgemc_versions}"
ordering = "NONE"
side = "BOTH"
