#Eazzy Server Utils - Chat Configuration
#enabled: Enable custom chat formatting
#format: Chat format. Use %name% for the player name and %message% for the message
#showHeadHover: Show the player head when hovering over the name (server-side compatible)
#showHeadIndicator: Show a small indicator before the player name (not the actual skin head)
#headIndicator: Character to use as head indicator when showHeadIndicator is true
#clickNameToMessage: Clicking a player name suggests /msg <player>
#NOTE: True inline player head rendering requires a client-side mod or resource pack
#Sat Jul 04 13:16:48 CEST 2026
clickNameToMessage=true
enabled=true
format=§b%name% §7» §f%message%
headIndicator=\u263A
showHeadHover=true
showHeadIndicator=false
